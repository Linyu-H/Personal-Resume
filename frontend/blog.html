<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="林宇航的技术博客 - 分享全栈开发经验与技术思考" />
    <title>博客 | 林宇航</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <link rel="stylesheet" href="./css/micro-interactions.css" />
    <style>
      .blog-wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: var(--space-7) var(--space-4) var(--space-9);
      }

      /* 作者头部 */
      .author-head {
        display: flex;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-6);
        padding: var(--space-5) var(--space-6);
      }

      .author-mark {
        flex-shrink: 0;
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-md);
        background: var(--primary);
        color: var(--on-primary);
        font-size: 26px;
        font-weight: 800;
      }

      .author-name {
        margin: 0 0 var(--space-1);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .author-bio {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      /* 搜索 + 标签 */
      .search-row {
        display: flex;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
      }

      .search-row .input { flex: 1; }

      .tag-filter {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-6);
      }

      .tag-filter-btn {
        padding: 6px 14px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-pill);
        background: var(--paper);
        color: var(--muted);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      }

      .tag-filter-btn:hover,
      .tag-filter-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--on-accent);
      }

      /* 文章信息流 */
      .feed {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
      }

      .moment {
        display: flex;
        gap: var(--space-4);
        padding: var(--space-5);
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xs);
        transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      }

      .moment:hover {
        box-shadow: var(--shadow-sm);
        border-color: var(--line-strong);
        transform: translateY(-2px);
      }

      .moment-avatar {
        flex-shrink: 0;
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-md);
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 18px;
        font-weight: 800;
      }

      .moment-body { flex: 1; min-width: 0; }

      .moment-name {
        margin: 0 0 var(--space-1);
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      .moment-title {
        margin: 0 0 var(--space-2);
        color: var(--text-strong);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.01em;
        line-height: 1.4;
        cursor: pointer;
      }

      .moment-title:hover { color: var(--accent); }

      .moment-text {
        margin: 0 0 var(--space-3);
        color: var(--muted);
        font-size: 14.5px;
        line-height: 1.7;
        word-break: break-word;
      }

      .moment-images {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-2);
        max-width: 300px;
        margin-bottom: var(--space-3);
      }

      .moment-images.single {
        grid-template-columns: 1fr;
        max-width: 180px;
      }

      .moment-img {
        aspect-ratio: 1 / 1;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .moment-img:hover { opacity: 0.88; }

      .moment-tags {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-3);
      }

      .moment-tag {
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .moment-tag::before { content: "#"; }

      .moment-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        padding-top: var(--space-3);
        border-top: 1px solid var(--line);
      }

      .moment-time { color: var(--muted); font-size: 13px; }

      .moment-actions { display: flex; gap: var(--space-2); }

      .moment-action {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 12px;
        border-radius: var(--radius-md);
        background: var(--surface-2);
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        transition: background-color 0.18s ease, color 0.18s ease;
      }

      .moment-action:hover {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .moment-action.liked { color: var(--danger); }

      .empty-state {
        text-align: center;
        padding: var(--space-8) var(--space-4);
        color: var(--muted);
      }

      .empty-icon { font-size: 40px; margin-bottom: var(--space-3); }

      @media (max-width: 768px) {
        .moment { padding: var(--space-4); gap: var(--space-3); }
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <!-- Navigation -->
      <nav class="nav">
        <a class="brand" href="/">
          <span class="brand-mark">林</span>
          <span>林宇航</span>
        </a>
        <div class="nav-links">
          <a href="/#featured">项目</a>
          <a href="resume.html">简历</a>
          <a href="portfolio.html">作品集</a>
          <a href="blog.html" class="active">博客</a>
          <a href="/#contact">联系</a>
        </div>
      </nav>

      <div class="blog-wrap">
        <!-- 作者头部 -->
        <header class="author-head card">
          <div class="author-mark">林</div>
          <div>
            <h1 class="author-name">林宇航</h1>
            <p class="author-bio">Java 后端 / Web 全栈 · 技术写作与工程实践</p>
          </div>
        </header>

        <!-- 搜索 + 标签 -->
        <div class="search-row">
          <input type="text" class="input" id="search-input" placeholder="搜索文章标题或内容…" />
          <button class="btn btn--primary ripple" id="search-btn">搜索</button>
        </div>
        <div class="tag-filter" id="tag-filter">
          <button class="tag-filter-btn ripple active" data-tag="all">全部</button>
          <!-- 动态加载标签 -->
        </div>

        <!-- 信息流 -->
        <main class="feed" id="blog-grid">
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>正在加载动态…</p>
          </div>
        </main>
      </div>

      <footer class="footer">
        <div class="footer-inner">
          <div class="footer-links">
            <a href="/">首页</a>
            <a href="resume.html">简历</a>
            <a href="portfolio.html">作品集</a>
            <a href="admin.html">管理</a>
          </div>
          <p class="footer-text">© 2025 林宇航 · Java Backend &amp; Web Full Stack Developer</p>
        </div>
      </footer>
    </div>

    <script src="./js/theme.js"></script>
    <script src="./js/animations.js"></script>
    <script src="./js/micro-interactions.js"></script>
    <script src="./js/particles.js"></script>
    <script>
      // 博客列表页逻辑
      let allBlogs = [];
      let currentTag = 'all';
      let searchQuery = '';

      async function loadBlogs() {
        try {
          const response = await fetch('/api/blogs');
          const result = await response.json();
          if (result.success) {
            allBlogs = result.data;
            renderBlogs(allBlogs);
            loadTags();
          }
        } catch (error) {
          console.error('加载博客失败:', error);
          document.getElementById('blog-grid').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">❌</div>
              <p>加载失败，请稍后重试</p>
            </div>
          `;
        }
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function timeAgo(dateStr) {
        const d = new Date(dateStr);
        const diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
        if (diff < 2592000) return Math.floor(diff / 86400) + ' 天前';
        return d.toLocaleDateString('zh-CN');
      }

      // 配图占位渐变（克制的蓝 / 灰蓝 / 青 / 靛色调）
      const IMG_GRADIENTS = [
        'linear-gradient(135deg,#0369a1,#0ea5e9)',
        'linear-gradient(135deg,#1e293b,#334155)',
        'linear-gradient(135deg,#0f766e,#14b8a6)',
        'linear-gradient(135deg,#3730a3,#6366f1)',
        'linear-gradient(135deg,#475569,#64748b)',
        'linear-gradient(135deg,#0c4a6e,#0369a1)',
      ];
      const IMG_EMOJI = ['📄', '💡', '🚀', '⚙️', '🎨', '📦', '🔧', '🌱', '🧩'];

      function renderBlogs(blogs) {
        const grid = document.getElementById('blog-grid');

        if (blogs.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🔍</div>
              <p>没有找到相关动态</p>
            </div>
          `;
          return;
        }

        grid.innerHTML = blogs.map((blog, index) => {
          const imgCount = blog.cover_image ? 1 : Math.min((blog.tags.length || 1), 3);
          const single = imgCount === 1 ? ' single' : '';
          const imgs = Array.from({ length: imgCount }).map((_, i) => {
            const g = IMG_GRADIENTS[(index + i) % IMG_GRADIENTS.length];
            const e = IMG_EMOJI[(index + i) % IMG_EMOJI.length];
            return `<div class="moment-img" style="background:${g}" onclick="location.href='blog-detail.html?slug=${encodeURIComponent(blog.slug)}'">${e}</div>`;
          }).join('');

          const tags = blog.tags.map(t =>
            `<span class="moment-tag" onclick="filterByTag('${escapeHtml(t)}')">${escapeHtml(t)}</span>`
          ).join('');

          const likeKey = 'blog_like_' + blog.slug;
          const liked = localStorage.getItem(likeKey) === '1';
          const baseLikes = (blog.views || 0);

          return `
            <article class="moment animate-on-scroll fade-in-up">
              <div class="moment-avatar">林</div>
              <div class="moment-body">
                <p class="moment-name">林宇航</p>
                <h2 class="moment-title" onclick="location.href='blog-detail.html?slug=${encodeURIComponent(blog.slug)}'">${escapeHtml(blog.title)}</h2>
                <p class="moment-text">${escapeHtml(blog.summary || '点击查看全文…')}</p>
                <div class="moment-images${single}">${imgs}</div>
                ${tags ? `<div class="moment-tags">${tags}</div>` : ''}
                <div class="moment-footer">
                  <span class="moment-time">${timeAgo(blog.created_at)}</span>
                  <div class="moment-actions">
                    <span class="moment-action like-btn ${liked ? 'liked' : ''}" data-slug="${escapeHtml(blog.slug)}" data-base="${baseLikes}">
                      ❤️ <span class="like-count">${baseLikes + (liked ? 1 : 0)}</span>
                    </span>
                    <span class="moment-action" onclick="location.href='blog-detail.html?slug=${encodeURIComponent(blog.slug)}'">💬 阅读</span>
                  </div>
                </div>
              </div>
            </article>
          `;
        }).join('');

        bindLikeButtons();
        window.dispatchEvent(new Event('contentLoaded'));
      }

      function bindLikeButtons() {
        document.querySelectorAll('.like-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const slug = btn.dataset.slug;
            const base = parseInt(btn.dataset.base, 10) || 0;
            const key = 'blog_like_' + slug;
            const liked = localStorage.getItem(key) === '1';
            if (liked) {
              localStorage.removeItem(key);
              btn.classList.remove('liked');
            } else {
              localStorage.setItem(key, '1');
              btn.classList.add('liked');
            }
            btn.querySelector('.like-count').textContent = base + (liked ? 0 : 1);
          });
        });
      }

      function filterByTag(tag) {
        currentTag = tag;
        document.querySelectorAll('.tag-filter-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.tag === tag);
        });
        filterBlogs();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      async function loadTags() {
        try {
          const response = await fetch('/api/blogs/meta/tags');
          const result = await response.json();
          if (result.success && result.data.length > 0) {
            const tagFilter = document.getElementById('tag-filter');
            result.data.forEach(tag => {
              const button = document.createElement('button');
              button.className = 'tag-filter-btn ripple';
              button.dataset.tag = tag;
              button.textContent = tag;
              tagFilter.appendChild(button);
            });
          }
        } catch (error) {
          console.error('加载标签失败:', error);
        }
      }

      function filterBlogs() {
        let filtered = allBlogs;
        if (currentTag !== 'all') {
          filtered = filtered.filter(blog => blog.tags.includes(currentTag));
        }
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          filtered = filtered.filter(blog =>
            (blog.title || '').toLowerCase().includes(q) ||
            (blog.summary || '').toLowerCase().includes(q)
          );
        }
        renderBlogs(filtered);
      }

      document.getElementById('tag-filter').addEventListener('click', (e) => {
        if (e.target.classList.contains('tag-filter-btn')) {
          document.querySelectorAll('.tag-filter-btn').forEach(btn => btn.classList.remove('active'));
          e.target.classList.add('active');
          currentTag = e.target.dataset.tag;
          filterBlogs();
        }
      });

      document.getElementById('search-btn').addEventListener('click', () => {
        searchQuery = document.getElementById('search-input').value.trim();
        filterBlogs();
      });

      document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          searchQuery = e.target.value.trim();
          filterBlogs();
        }
      });

      loadBlogs();
    </script>
  </body>
</html>
