<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="林宇航的个人简历，展示 Java 后端开发、Web 全栈项目、图片应用和浏览器自动化经验。" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <link rel="stylesheet" href="./css/micro-interactions.css" />
    <title>林宇航 | 简历</title>
    <style>
      .resume-shell {
        width: min(1080px, calc(100% - 40px));
        margin: 0 auto;
        padding-bottom: var(--space-8);
      }

      .resume-hero { padding: var(--space-8) 0 var(--space-7); }

      .resume-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: var(--space-7);
        align-items: start;
      }

      h1, h2, h3, p { margin-top: 0; }

      .resume-header h1 {
        margin-bottom: var(--space-4);
        font-size: clamp(40px, 7vw, 64px);
        line-height: 1.04;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text-strong);
      }

      .role {
        max-width: 750px;
        margin-bottom: var(--space-5);
        color: var(--muted);
        font-size: clamp(16px, 2vw, 19px);
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        margin: var(--space-5) 0 var(--space-6);
      }

      .quick-facts {
        display: grid;
        max-width: 760px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .quick-facts li {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr);
        gap: var(--space-4);
        padding: var(--space-3) 0;
        border-top: 1px solid var(--line);
      }

      .quick-facts span { color: var(--muted); font-size: 14px; }
      .quick-facts strong { color: var(--text); font-weight: 600; }

      .identity-card {
        padding: var(--space-5);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--paper);
        box-shadow: var(--shadow-xs);
      }

      .identity-card img {
        width: 100%;
        aspect-ratio: 4 / 5;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        object-fit: cover;
        background: var(--surface-2);
      }

      .identity-card dl {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        gap: 10px 14px;
        margin: var(--space-4) 0 0;
      }

      .identity-card dt { color: var(--muted); font-size: 14px; }
      .identity-card dd { margin: 0; font-weight: 600; }
      .identity-card a { color: var(--accent); font-weight: 600; }

      main { border-top: 1px solid var(--line); }

      .section {
        display: grid;
        grid-template-columns: 180px minmax(0, 1fr);
        gap: var(--space-6);
        padding: var(--space-7) 0;
        border-bottom: 1px solid var(--line);
      }

      .section-title { align-self: start; }

      .section-index {
        display: block;
        margin-bottom: var(--space-2);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
      }

      .section h2 {
        margin-bottom: 0;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      h3 { margin-bottom: var(--space-2); font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }

      .plain-list, .resume-item ul { margin: 0; padding-left: 1.2em; }
      .plain-list li, .resume-item li { margin-bottom: var(--space-2); line-height: 1.65; }

      .skill-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--space-4);
      }

      .skill-block {
        padding: var(--space-4);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--paper);
        box-shadow: var(--shadow-xs);
      }

      .skill-block p { margin-bottom: 0; color: var(--muted); font-size: 14.5px; line-height: 1.6; }

      .resume-list { display: grid; gap: var(--space-6); }

      .resume-item {
        padding-bottom: var(--space-6);
        border-bottom: 1px solid var(--line);
      }

      .resume-item:last-child { padding-bottom: 0; border-bottom: 0; }

      .item-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--space-5);
        margin-bottom: var(--space-3);
      }

      .meta { margin-bottom: var(--space-3); color: var(--muted); font-size: 14px; }

      .text-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-top: var(--space-3);
        color: var(--accent);
        font-weight: 600;
        white-space: nowrap;
      }

      .text-link:hover { color: var(--accent-hover); }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-3);
      }

      .award-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--space-3);
      }

      .award-item {
        padding: var(--space-4);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: var(--paper);
        box-shadow: var(--shadow-xs);
      }

      .award-item p { margin-bottom: 0; color: var(--muted); font-size: 14.5px; }

      .contact-card {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        padding: var(--space-5);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--paper);
        box-shadow: var(--shadow-xs);
      }

      .contact-card p { max-width: 560px; margin-bottom: 0; color: var(--muted); }
      .contact-card strong { color: var(--text-strong); }

      .contact-links { display: flex; flex-wrap: wrap; gap: var(--space-2); }

      .resume-footer {
        padding: var(--space-7) 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 13.5px;
      }

      .resume-footer a { color: var(--muted); }
      .resume-footer a:hover { color: var(--accent); }

      @media (max-width: 860px) {
        .resume-header, .section { grid-template-columns: 1fr; }
        .identity-card { max-width: 340px; }
        .skill-grid, .award-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 560px) {
        .actions { flex-direction: column; }
        .actions .btn { width: 100%; }
        .quick-facts li { grid-template-columns: 1fr; gap: 4px; }
        .item-header { flex-direction: column; }
      }

      @media print {
        body { background: #fff; color: #111; }
        body::before, .nav, .theme-toggle, .back-to-top, .scroll-progress,
        #particles-canvas, .actions, .resume-footer { display: none !important; }
        .resume-shell { width: 100%; }
        .resume-hero, .section { padding: 18px 0; }
        .resume-header, .section { grid-template-columns: 1fr; gap: 16px; }
        .identity-card, .skill-block, .award-item, .contact-card { box-shadow: none; break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <!-- Navigation (full-width) -->
    <nav class="nav" aria-label="页面导航">
        <a class="brand" href="/">
          <span>林宇航</span>
        </a>
      <div class="nav-links">
        <a href="/#featured">项目</a>
        <a href="resume.html" class="active">简历</a>
        <a href="portfolio.html">作品集</a>
        <a href="blog.html">博客</a>
        <a href="/#contact">联系</a>
      </div>
    </nav>

    <div class="site-shell" style="padding:0;">
      <iframe
        src="https://mine.lcode.store/"
        title="林宇航简历"
        style="width:100%;height:calc(100vh - 64px);border:0;display:block;"
        loading="lazy"
        allow="fullscreen"
      ></iframe>
    </div>

    <script src="./js/theme.js"></script>
    <script src="./js/animations.js"></script>
    <script src="./js/micro-interactions.js"></script>
    <script src="./js/particles.js"></script>
  </body>
</html>
